          "jobDescription": "ROLE: Staff Full-Stack Engineer (FinTech & Creative Tech)\r\nLOCATION: Hybrid / Remote\r\n\r\nOVERVIEW:\r\nJoin our 'Creative Engineering' pod where we build the next generation of financial storytelling tools. We aren't just looking for someone who can write code; we need a visionary who understands how to use motion and data visualization to simplify complex financial concepts for millions of users.\r\n\r\nCORE RESPONSIBILITIES:\r\n- Architect and maintain a robust Full-Stack environment using Next.js, TypeScript, and Prisma.\r\n- Design highly interactive, data-driven dashboards utilizing GSAP and D3.js for complex financial modeling visualizations.\r\n- Optimize application performance to achieve 'Core Web Vitals' scores of 95+ across all platforms.\r\n- Leading the migration of our legacy desktop suite into a modern ElectronJS framework.\r\n- Collaborate with the Security team to ensure PCI-DSS compliance across our payment gateways (Razorpay/Stripe).\r\n- Implement automated testing suites (Cypress/Jest) to ensure 90%+ code coverage.\r\n- Act as a technical consultant for the Product and Design teams, providing feasibility reports on complex animations.\r\n\r\nMINIMUM QUALIFICATIONS:\r\n- 7+ years of professional experience in Software Engineering.\r\n- Mastery of JavaScript/TypeScript and the React ecosystem.\r\n- Deep expertise in GSAP or similar animation libraries for scroll-based interactions.\r\n- Experience with SQL and NoSQL databases, specifically performance tuning for large datasets.\r\n- Prior experience in the E-commerce or FinTech sectors is mandatory.\r\n\r\nPREFERRED QUALIFICATIONS:\r\n- Experience with specialized hardware integration (printers, scanners) via Electron or Native modules.\r\n- A strong portfolio of published mobile or desktop applications.\r\n- Background in MCA or equivalent higher technical degree.",
          "resume": "Soumya Sankar Das   soumyadas429@gmail.com   |   8250146084  React Front End Developer   GitHub |   LinkedIn  Front-end developer with 1.3+ years of experience building responsive web, desktop, and mobile applications. Proficient in   ReactJS ,   ElectronJS , and   React Native   with a focus on secure authentication and scalable business logic.  RELEVANT WORK EXPERIENCE  Heltech Services | Software Developer   Dec 2024 – Present  ➢   HS-POS (Web & Desktop App):  o   Tech Stack:   [React, Express, Electron, Node.js, MySQL, SQLite, Prisma ORM]  o   Features dynamic inventory, dashboard analytics (sales insights, top products), and multi-outlet transfers (warehouse → store).  o   Integrated POS printer support for billing (normal/bulk modes) and printable transfer slips.  o   Implemented secure role-based access control (RBAC) using JWT and refresh tokens.  o   Designed a fully responsive UI with light/dark mode and customizable branding.  o   Supports multi-user system under one admin.  o   Integrated   Razorpay   for secure payment processing.  ➢   Heltech-ERP (Web App):  o   Tech Stack:   [React, Express, Node.js, and MySQL]  o   Role-based access with JWT & refresh tokens; OTP validation for employee creation & password reset via mail.  o   Built a comprehensive ERP system for employee lifecycle management, payroll automation, and HR workflows.  o   Attendance tracking with OT & comp-off; leave application, calculation, and approval system.  o   Payroll automation with salary calculation, reimbursement approval, and payslip generation (auto-mail to employees).  ➢   Aamar Poribar (E-commerce Mobile App) |   React Native Developer :  o   Tech Stack:   [React Native, Express, Node.js, and MySQL]  o   Architected and optimized a fully functional   E-commerce   mobile application.  o   Successfully deployed and published the application on the   Google Play Store .  o   Integrated   Juspay   for secure payment processing.  SentientGeeks | Front End Developer   Aug 2024 – Nov 2024  EDUCATION  Languages:   JavaScript (ES6+), TypeScript  Frontend & UI:   React.js, Next.js, Tailwind CSS, shadcn/ui, GSAP, Motion  Mobile & Desktop:   React Native, ElectronJS  State Management:   Redux Toolkit, Context API  Backend & DB:   Supabase, Convex  Authentication:   JWT (with Refresh Tokens), Clerk Auth, OTP validation  Tools:   Git & GitHub, ImageKit, Razorpay/Juspay Integration  EDUCATION  Vidyasagar University   (Master of Computer Application)   Oct 2022 – July 2024  Midnapore College (Autonomous)   (Bachelor of Computer Application)   Aug 2019 - Sept 2022\n",
          "selfDescription": "I am a developer who lives at the intersection of technical logic and creative motion. My journey started with a deep fascination for how web interfaces can feel 'alive,' which led me to master GSAP for immersive UI. In my recent roles, I have evolved from a pure frontend specialist into a full-stack architect. I am comfortable managing the entire lifecycle of a project—from the initial database schema design in MongoDB or Prisma to the final deployment on AWS.\r\n\r\nWhat sets me apart is my experience with 'fringe' web tech like ElectronJS. I love the challenge of making web technologies interact with hardware, like thermal printers or local file systems. I’ve worked under project managers like Rishap Kumar Singh at Heltech, where I learned the importance of balancing rapid feature delivery with long-term code maintainability. I am now looking to step into a Senior Full-Stack role where I can lead the adoption of modern frameworks while ensuring the user experience remains butter-smooth and high-performing.",
          "matchScore": 0.6,
          "technicalQuestions": [
            {
              "question": "Imagine a scenario where a user is reporting slow loading times on a complex financial dashboard. The dashboard visualizes large datasets using GSAP animations and D3.js. How would you diagnose and resolve performance issues to achieve Core Web Vitals scores of 95+?",
              "intention": "Assess the candidate's ability to diagnose and resolve front-end performance bottlenecks in a data-intensive and animation-heavy application, aligning with the JD's emphasis on Core Web Vitals and GSAP/D3.js.",
              "answer": "I would start by using browser developer tools (Lighthouse, Performance tab) to identify specific performance culprits, such as unoptimized D3.js rendering, excessive GSAP animations running simultaneously, or large data payloads. My approach would involve: \n1. **Profiling Data Fetching:** Analyze the network tab for large or slow API responses. If data fetching is the bottleneck, I'd explore techniques like pagination, data aggregation on the backend, or using a more efficient data fetching library like React Query. \n2. **Optimizing D3.js & GSAP:** For D3.js, I'd look into techniques like data joins, minimizing DOM manipulations, and potentially using WebGL for very large datasets. For GSAP, I would ensure animations are only running when necessary, using `requestAnimationFrame` for smoother rendering, and potentially leveraging GSAP's performance optimizations like `stagger` for sequences. \n3. **Code Splitting & Lazy Loading:** Implement code splitting for different dashboard components and lazy load components and assets that are not immediately visible. \n4. **Caching Strategies:** Implement client-side caching for frequently accessed data or static assets. \n5. **Core Web Vitals Monitoring:** Continuously monitor Core Web Vitals (LCP, FID, CLS) using tools like Lighthouse and real-user monitoring (RUM) to track improvements. \nFor example, in the HS-POS project, we faced performance issues with the dashboard analytics. By profiling and identifying that the initial data load for sales insights was too large, I implemented server-side aggregation for daily sales data and client-side caching, which significantly improved the load time and user experience.",
              "complexity": "advanced"
            },
            {
              "question": "The FinTech product requires integrating a new payment gateway, Stripe, alongside the existing Razorpay integration. The goal is to ensure PCI-DSS compliance. Describe your process for architecting and implementing this integration securely, including testing and potential challenges.",
              "intention": "Evaluate the candidate's understanding of security best practices, PCI-DSS compliance, and experience integrating payment gateways, specifically Stripe, in a FinTech context.",
              "answer": "Ensuring PCI-DSS compliance is paramount. My process would involve:\n1. **Understanding PCI-DSS Requirements:** Thoroughly review the specific PCI-DSS requirements relevant to payment processing (e.g., secure data handling, encryption, access controls). This involves consulting official PCI Security Standards Council documentation and potentially security advisories from Stripe and Razorpay.\n2. **Secure Integration Architecture:** I would leverage Stripe's client-side libraries (like Stripe.js) to handle sensitive card details directly, minimizing the exposure of raw card information on our servers. This means sensitive data would be tokenized on the client-side and the token sent to the backend for processing. For the backend integration, I would use the official Stripe Node.js SDK.\n3. **Backend Implementation:** Implement API endpoints in our Express/Node.js backend to securely communicate with Stripe's API using the SDK. This would include creating charges, managing subscriptions, and handling webhooks for payment status updates. For Razorpay, I would follow a similar secure pattern, ensuring idempotency for critical operations.\n4. **Testing:** Implement comprehensive unit and integration tests using Stripe's test mode and dedicated test API keys. Cypress would be ideal for end-to-end testing of the payment flow, simulating various payment scenarios (successful, failed, etc.). I would also set up mock servers for testing webhook handlers.\n5. **Collaboration with Security Team:** Maintain open communication with the security team to review the integration architecture, access controls, and data logging practices. \nIn the Heltech-ERP project, we integrated Razorpay. During this process, we established strict RBAC for payment-related modules and implemented robust logging for all payment transactions, ensuring we could audit any activity. This experience has prepared me to handle similar security-sensitive integrations like Stripe.",
              "complexity": "advanced"
            },
            {
              "question": "Our legacy desktop suite needs to be migrated to ElectronJS. Describe a phased approach you would take, focusing on maintaining feature parity initially while planning for future modernization. What are the key considerations for a smooth migration?",
              "intention": "Assess the candidate's strategic thinking for migrating a legacy desktop application to Electron, including their understanding of Electron's architecture and migration best practices.",
              "answer": "Migrating a legacy desktop suite to Electron requires a strategic, phased approach to minimize disruption and maximize long-term benefits.\n1. **Phase 1: Foundation & Core Functionality:** \n   - **Setup Electron Environment:** Create a new Electron project structure. \n   - **Replicate UI:** Port the existing UI components (likely from the legacy desktop app or existing web components) into the Electron renderer process. This might involve wrapping them in React components if not already done.\n   - **Core Business Logic:** Replicate the essential business logic in the main process or isolated renderer processes, ensuring data persistence (e.g., using SQLite as mentioned in the resume) and core functionalities remain intact.\n   - **Initial Testing:** Perform rigorous testing to ensure the core features function as expected, focusing on replicating the user experience of the legacy application.\n2. **Phase 2: Enhancements & Modernization:** \n   - **Leverage Web Technologies:** Gradually refactor UI components to use modern frontend frameworks (like React, as I've done) and styling (Tailwind CSS, shadcn/ui).\n   - **Optimize Performance:** Identify and address performance bottlenecks, potentially moving computationally intensive tasks to worker threads or optimizing data handling.\n   - **Integrate New Features:** Introduce new features that were difficult or impossible to implement in the legacy system.\n   - **Develop Automated Tests:** Implement automated testing suites (e.g., Jest for unit/integration, and potentially Playwright/Cypress for end-to-end testing within Electron).\n3. **Phase 3: Full Modernization & Deployment:** \n   - **Decommission Legacy App:** Once the Electron version is stable and feature-complete, plan the sunsetting of the legacy application.\n   - **Continuous Improvement:** Establish CI/CD pipelines for Electron builds and deployments, and continue to iterate based on user feedback and evolving requirements.\n\nKey considerations for a smooth migration include:\n- **Deep understanding of legacy system:** Thoroughly analyze the existing codebase and architecture.\n- **Data migration strategy:** Plan how to migrate existing user data to the new Electron application's storage.\n- **Cross-platform compatibility:** Test rigorously on Windows, macOS, and Linux.\n- **Security:** Implement appropriate security measures for the main and renderer processes.\nIn my experience with HS-POS, I successfully built both web and desktop versions using React and Electron, integrating features like POS printer support and secure RBAC. This involved careful management of process communication and UI rendering, which is directly applicable to migrating a legacy suite.",
              "complexity": "advanced"
            },
            {
              "question": "You need to design a system for visualizing real-time financial market data (e.g., stock prices, trading volumes) with complex, dynamic animations for a 'Creative Engineering' pod. The goal is to simplify intricate financial concepts. How would you approach this using GSAP, D3.js, and potentially other libraries, considering performance and interactivity?",
              "intention": "Assess the candidate's ability to combine animation (GSAP), data visualization (D3.js), and potentially other libraries to create sophisticated, performant, and interactive financial visualizations, directly addressing the JD's 'Creative Engineering' and data visualization requirements.",
              "answer": "My approach would be to create a modular and performant visualization system that leverages the strengths of each library:\n1. **Data Ingestion & Preprocessing:** Use a real-time data streaming service (e.g., WebSockets) to receive market data. On the client-side, I'd implement efficient data structures and potentially a state management solution (like Redux Toolkit or Context API) to handle incoming data streams without causing excessive re-renders. Libraries like `lodash` could assist in data manipulation.\n2. **D3.js for Core Visualization:** D3.js would be my choice for the underlying data manipulation and SVG/Canvas rendering. I'd focus on using D3's data binding capabilities and optimized rendering techniques. For large datasets, I'd consider D3 Canvas rendering or even WebGL for performance.\n3. **GSAP for Animation & Interactivity:** GSAP would orchestrate the animations triggered by data updates or user interactions. This includes:\n   - **Smooth Transitions:** Animating data points, scales, and axes as new data arrives.\n   - **Scroll-Based Interactions:** Implementing scroll-triggered animations to reveal insights or tell a story as the user scrolls through the page, a key requirement for financial storytelling.\n   - **Micro-interactions:** Adding subtle animations to highlight key data points or provide feedback on user actions.\n   - **Sequencing Complex Visualizations:** Using GSAP's timeline features to coordinate multiple animated elements for a cohesive presentation.\n4. **Integration Strategy:** D3 would handle the core data-to-visual mapping, and GSAP would animate the changes in D3-generated elements (SVG attributes, positions, etc.) or directly manipulate elements managed by GSAP.\n5. **Performance Optimization:** \n   - **Debouncing/Throttling:** For rapid data streams, I'd use debouncing or throttling techniques to limit the frequency of updates and animations.\n   - **Memoization:** Memoize expensive calculations or D3-rendered components.\n   - **Offloading Tasks:** Use Web Workers for heavy data processing to keep the main thread free.\n   - **Canvas vs. SVG:** Choose between SVG (for crispness and ease of interaction) and Canvas (for performance with many elements).\n\nFor the 'Aamar Poribar' e-commerce app, while not directly financial data, I architected and optimized the entire application, including integrating payment processing. This involved careful attention to user experience and performance. Applying this to financial data, I would ensure that complex visualizations are not only visually appealing with GSAP but also performant and interactive, enabling users to intuitively grasp financial concepts.",
              "complexity": "advanced"
            },
            {
              "question": "Describe your experience with state management in React for complex applications, specifically in managing user sessions, permissions, and dynamic UI states. How would you ensure consistency and predictability in a large-scale FinTech application?",
              "intention": "Understand the candidate's proficiency in managing complex application state, particularly relevant for user authentication, authorization, and dynamic UI in a FinTech environment.",
              "answer": "In complex applications like ERP systems or FinTech platforms, robust state management is crucial for consistency and predictability. I primarily use **Redux Toolkit** for global state management due to its opinionated structure, built-in best practices (like Immer for immutable updates), and developer experience.\n\nFor user sessions and permissions, I would establish dedicated slices in Redux Toolkit to store:\n- **Authentication State:** `isAuthenticated`, `userToken` (JWT), `refreshToken`, `tokenExpiration`.\n- **User Profile & Permissions:** `user`, `roles`, `permissions`.\n\nThese states would be managed through asynchronous thunks (using `createAsyncThunk`) that handle API calls for login, refresh token, and fetching user profile/permissions. Actions like `loginSuccess` would update the state, and selectors would provide efficient access to this data across the application.\n\nFor dynamic UI states that are more localized, I leverage React's built-in **Context API** combined with `useReducer` for complex local state logic, or simple `useState` hooks for straightforward component-level state.\n\nTo ensure consistency and predictability:\n1. **Single Source of Truth:** Redux Toolkit acts as the single source of truth for global application state.\n2. **Immutable Updates:** Redux Toolkit's Immer integration enforces immutable state updates, preventing accidental mutations and making state changes predictable.\n3. **Clear Action Definitions:** Define clear actions for state transitions, making it easier to track how state changes occur.\n4. **Selectors:** Utilize Reselect or Redux Toolkit's built-in selectors for efficient and memoized data retrieval, preventing unnecessary re-renders.\n5. **TypeScript Integration:** Use TypeScript extensively to define state shapes, action payloads, and reducer signatures, catching many potential errors at compile time.\n\nIn the Heltech-ERP project, managing the complex role-based access control (RBAC) required a robust state management strategy. We used JWT and refresh tokens stored securely, and the user's permissions were centrally managed and consumed by various components to conditionally render UI elements and control feature access. This ensured that user permissions were consistently applied throughout the application.",
              "complexity": "intermediate"
            }
          ],
          "behavioralQuestions": [
            {
              "question": "Describe a time you had to balance rapid feature delivery with long-term code maintainability. How did you make decisions to achieve this balance?",
              "intention": "Assess the candidate's ability to prioritize and make trade-offs between speed and quality, a common challenge in software development, particularly relevant given the JD's emphasis on robust architecture and modernization.",
              "answer": "At Heltech, we often faced pressure to deliver new features quickly for our POS and ERP systems. A specific instance involved implementing a new payroll calculation module. The project manager, Rishap Kumar Singh, wanted it delivered within two weeks. \n\nTo balance speed and maintainability, I advocated for an iterative approach. We first focused on building the core calculation engine with a clean, testable architecture, even if it meant deferring some 'nice-to-have' UI elements like advanced animations or extensive reporting options. I ensured that the core logic was well-abstracted and had comprehensive unit tests.\n\nFor the UI and reporting, we implemented basic versions first, clearly documenting that these were placeholders for future enhancements. This allowed us to meet the deadline for the critical calculation functionality while providing a clear roadmap for subsequent development. The key was clear communication with the project manager about what could be achieved within the timeline and what would require future iterations, ensuring transparency about technical debt incurred.\n\nThis approach allowed us to deliver the essential payroll functionality on time, providing immediate business value, while the well-structured core engine made it easier to add the advanced features and reporting later without significant refactoring, thus maintaining long-term code health."
            },
            {
              "question": "Tell me about a challenging technical problem you faced where you had to step outside your primary area of expertise (e.g., from frontend to backend or vice-versa) to find a solution. How did you approach it?",
              "intention": "Understand the candidate's adaptability, problem-solving skills, and willingness to learn and contribute across different technical domains.",
              "answer": "While working on the 'Aamar Poribar' e-commerce mobile app, we encountered a critical issue with payment processing through Juspay. The initial integration was done by another developer, and after deployment, we started receiving intermittent payment failures that were difficult to reproduce. The problem seemed to lie in the server-side handling of Juspay's callbacks and state management. \n\nAlthough my primary focus was frontend (React Native), I had to dive deep into the backend (Express/Node.js) and understand the Juspay API flow to debug this. I spent time meticulously tracing the request-response cycle, examining server logs, and understanding how the payment status was being updated in our MySQL database. I had to familiarize myself with Node.js asynchronous patterns and error handling in that context, which was less familiar territory than JavaScript in React Native.\n\nI discovered that there was a race condition where multiple callbacks could arrive for the same transaction, leading to incorrect state updates. My solution involved implementing a more robust idempotency key mechanism on the server-side for handling Juspay callbacks and ensuring that transaction states were updated atomically using database transactions. This required learning more about backend concurrency and database transaction management. \n\nBy taking ownership of this issue and learning the necessary backend concepts, I was able to resolve the intermittent payment failures, significantly improving user trust and conversion rates for the app. This experience reinforced my comfort with full-stack problem-solving."
            },
            {
              "question": "Describe a situation where you had to collaborate with product or design teams on a complex animation or UI feature. How did you manage their expectations and ensure technical feasibility?",
              "intention": "Evaluate the candidate's collaboration skills, ability to translate creative ideas into technical realities, and communication effectiveness with non-technical stakeholders.",
              "answer": "On the HS-POS project, the product manager wanted a highly interactive and visually engaging dashboard with dynamic charts that could show sales insights and top products in real-time. They had a vision for smooth transitions and animations to make the data more digestible and appealing. \n\nMy role was to bridge the gap between their creative vision and technical feasibility. Initially, I worked closely with the product manager to understand the core message they wanted to convey with each visualization. I then explored different animation techniques using GSAP and charting libraries like Chart.js (which we later decided to pair with D3.js for more advanced capabilities).\n\nI created several interactive prototypes using React and GSAP to demonstrate different animation possibilities and their performance implications. For example, I showed them how animating thousands of data points smoothly on a chart could impact performance and proposed alternative, perhaps less flashy but more performant, animations. I also provided feasibility reports on complex requests, explaining the effort involved and potential trade-offs.\n\nWe had regular feedback sessions where I would demo the prototypes and explain the technical constraints or possibilities. This iterative process allowed us to refine the designs. For instance, instead of a complex real-time animation of every single sales transaction, we opted for animated updates of aggregated daily sales figures and animated transitions when filtering product categories, which was both visually appealing and technically achievable within our timeline and performance goals. This collaborative approach ensured the final product met both the creative and functional requirements."
            }
          ],
