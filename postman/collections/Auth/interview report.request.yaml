      key: jobDescription
      value: >-
        ROLE: Staff Full-Stack Engineer (FinTech & Creative Tech)

        LOCATION: Hybrid / Remote


        OVERVIEW:

        Join our 'Creative Engineering' pod where we build the next generation
        of financial storytelling tools. We aren't just looking for someone who
        can write code; we need a visionary who understands how to use motion
        and data visualization to simplify complex financial concepts for
        millions of users.


        CORE RESPONSIBILITIES:

        - Architect and maintain a robust Full-Stack environment using Next.js,
        TypeScript, and Prisma.

        - Design highly interactive, data-driven dashboards utilizing GSAP and
        D3.js for complex financial modeling visualizations.

        - Optimize application performance to achieve 'Core Web Vitals' scores
        of 95+ across all platforms.

        - Leading the migration of our legacy desktop suite into a modern
        ElectronJS framework.

        - Collaborate with the Security team to ensure PCI-DSS compliance across
        our payment gateways (Razorpay/Stripe).

        - Implement automated testing suites (Cypress/Jest) to ensure 90%+ code
        coverage.

        - Act as a technical consultant for the Product and Design teams,
        providing feasibility reports on complex animations.


        MINIMUM QUALIFICATIONS:

        - 7+ years of professional experience in Software Engineering.

        - Mastery of JavaScript/TypeScript and the React ecosystem.

        - Deep expertise in GSAP or similar animation libraries for scroll-based
        interactions.

        - Experience with SQL and NoSQL databases, specifically performance
        tuning for large datasets.

        - Prior experience in the E-commerce or FinTech sectors is mandatory.


        PREFERRED QUALIFICATIONS:

        - Experience with specialized hardware integration (printers, scanners)
        via Electron or Native modules.

        - A strong portfolio of published mobile or desktop applications.

        - Background in MCA or equivalent higher technical degree.
      description: ""
      disabled: false
    - type: text
      key: selfDescription
      value: >-
        I am a developer who lives at the intersection of technical logic and
        creative motion. My journey started with a deep fascination for how web
        interfaces can feel 'alive,' which led me to master GSAP for immersive
        UI. In my recent roles, I have evolved from a pure frontend specialist
        into a full-stack architect. I am comfortable managing the entire
        lifecycle of a project—from the initial database schema design in
        MongoDB or Prisma to the final deployment on AWS.


        What sets me apart is my experience with 'fringe' web tech like
        ElectronJS. I love the challenge of making web technologies interact
        with hardware, like thermal printers or local file systems. I’ve worked
        under project managers like Rishap Kumar Singh at Heltech, where I
        learned the importance of balancing rapid feature delivery with
        long-term code maintainability. I am now looking to step into a Senior
        Full-Stack role where I can lead the adoption of modern frameworks while
        ensuring the user experience remains butter-smooth and high-performing.
